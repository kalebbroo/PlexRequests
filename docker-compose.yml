# PlexRequests — modular stack. Copy docker/.env.example to .env first.
#
# The VPN and the torrent client are BOTH optional here, so you can bring your own:
#
#   1) Bring your own VPN + torrent client (default):
#         docker compose up -d
#      Point DELUGE_URL at your existing Deluge in .env; leave VPN_ENABLED=false.
#
#   2) Managed torrent client, no managed VPN:
#         docker compose --profile torrent up -d
#      A Deluge container is started and the downloader uses it automatically
#      (http://deluge:8112). Run torrents behind your own network/VPN as you see fit.
#
#   3) Managed VPN + torrent client with a kill-switch:
#         docker compose -f docker-compose.vpn.yml up -d
#      A separate, self-contained stack that routes Deluge + the downloader through
#      gluetun so their only egress is the VPN tunnel.
#
# web is always started. downloader is always started. deluge only with --profile torrent.

services:
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: plexrequests-web
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__AppDb: /data/app.db
      Fulfillment__Enabled: "true"
      Fulfillment__ApiKey: ${FULFILLMENT_API_KEY}
      Bridge__Enabled: ${BRIDGE_ENABLED:-false}
      Bridge__ApiKey: ${BRIDGE_API_KEY:-}
      ApiKeys__TMDb__ApiKey: ${TMDB_API_KEY}
      Admin__Usernames: ${ADMIN_USERNAMES}
      Plex__PrimaryServerUrl: ${PLEX_URL}
      Plex__ServerToken: ${PLEX_TOKEN}
    volumes:
      - appdata:/data          # app.db
      - ./keys:/app/keys       # persisted DataProtection keys (auth cookies survive restarts)
    restart: unless-stopped

  # Optional managed torrent client — only started with:  --profile torrent
  deluge:
    image: lscr.io/linuxserver/deluge:latest
    container_name: plexrequests-deluge
    profiles: ["torrent"]
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: ${TZ:-Etc/UTC}
    volumes:
      - ./deluge-config:/config
      - media:/data            # downloads + library on ONE filesystem so hardlinks work
    ports:
      - "8112:8112"
    restart: unless-stopped

  downloader:
    build:
      context: .
      dockerfile: docker/downloader.Dockerfile
    container_name: plexrequests-downloader
    environment:
      Api__BaseUrl: http://web:8080
      Api__Key: ${FULFILLMENT_API_KEY}
      # Point at your own client, or leave the default to use the --profile torrent Deluge.
      Deluge__Url: ${DELUGE_URL:-http://deluge:8112}
      Deluge__Password: ${DELUGE_PASSWORD:-deluge}
      Library__MoviePath: /data/library/movies
      Library__TvPath: /data/library/tv
      Library__Hardlink: "true"
      # No managed VPN in this file; the app-level guard stays off (it never blocks a normally
      # connected box anyway — it only matters when the downloader is inside the VPN namespace).
      Vpn__Enabled: ${VPN_ENABLED:-false}
      Vpn__HealthCheckUrl: https://api.ipify.org
    volumes:
      - media:/data
      - downloader-state:/app/state
    depends_on:
      - web
    restart: unless-stopped

volumes:
  appdata:
  media:
  downloader-state:
